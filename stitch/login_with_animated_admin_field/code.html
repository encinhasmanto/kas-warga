<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ResidentPay - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    #admin-field {
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 0;
        transform: translateY(-10px);
        max-height: 0;
        overflow: hidden;
        margin-top: 0 !important;
    }
    #admin-field.visible {
        opacity: 1;
        transform: translateY(0);
        max-height: 200px;
        margin-top: 1.25rem !important;
    }
</style></head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4">
<!-- Login Container -->
<div class="w-full max-w-[440px] bg-white dark:bg-slate-900 shadow-xl rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Header / Logo Area -->
<div class="pt-10 pb-6 px-8 flex flex-col items-center">
<div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-4xl">apartment</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold tracking-tight">ResidentPay</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Residential Management System</p>
</div>
<!-- Form Area -->
<div class="px-8 pb-10 space-y-5">
<!-- Unit Selection Dropdown -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Select Unit or Role</label>
<div class="relative group">
<select class="appearance-none w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 rounded-lg px-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all cursor-pointer">
<option disabled="" selected="" value="">Choose your unit...</option>
<optgroup label="Section A">
<option>A1</option><option>A2</option><option>A3</option><option>A4</option><option>A5</option>
<option>A6</option><option>A7</option><option>A8</option><option>A9</option><option>A10</option>
<option>A11</option><option>A12</option>
</optgroup>
<optgroup label="Section B">
<option>B1</option><option>B2</option><option>B3</option><option>B4</option><option>B5</option>
<option>B6</option><option>B7</option><option>B8</option><option>B9</option><option>B10</option>
</optgroup>
<optgroup label="Section R">
<option>R1</option><option>R2</option><option>R3</option><option>R4</option><option>R5</option>
<option>R6</option><option>R7</option><option>R8</option><option>R9</option><option>R10</option>
<option>R11</option>
</optgroup>
<optgroup label="Management">
<option value="Admin">System Administrator</option>
</optgroup>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-slate-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Conditional Admin Input (Always rendered for layout preview, hidden in real logic) -->
<div class="" id="admin-field">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Admin Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 rounded-lg pl-10 pr-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="Enter administrator ID" type="text"/>
</div>
</div>
<!-- PIN Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Access PIN</label>
<a class="text-xs text-primary font-medium hover:underline" href="#">Forgot PIN?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 rounded-lg pl-10 pr-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all tracking-[0.5em] font-bold" maxlength="6" placeholder="••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-4 active:scale-[0.98]">
                Log In
                <span class="material-symbols-outlined text-xl">login</span>
</button>
</div>
<!-- Guest/Demo Section -->
<div class="bg-slate-50 dark:bg-slate-800/50 p-6 border-t border-slate-200 dark:border-slate-800">
<p class="text-center text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-4">Guest Access &amp; Demos</p>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 py-2.5 px-3 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-lg text-primary">person_outline</span>
                    Resident
                </button>
<button class="flex items-center justify-center gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 py-2.5 px-3 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-lg text-primary">shield_person</span>
                    Super Admin
                </button>
</div>
</div>
</div>
<!-- Footer Info -->
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex items-center gap-6 text-slate-500 dark:text-slate-400 text-sm">
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<span class="w-1 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Support</a>
</div>
<p class="text-xs text-slate-400 dark:text-slate-500">© 2024 ResidentPay Systems Inc. All rights reserved.</p>
</div>
<!-- Background Pattern -->
<div class="fixed inset-0 -z-10 opacity-[0.03] pointer-events-none">
<div class="absolute inset-0" data-alt="Subtle geometric dot pattern background" style="background-image: radial-gradient(#137fec 1px, transparent 1px); background-size: 32px 32px;"></div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const unitSelect = document.querySelector('select');
        const adminField = document.getElementById('admin-field');

        unitSelect.addEventListener('change', (e) => {
            if (e.target.value === 'Admin') {
                adminField.classList.add('visible');
            } else {
                adminField.classList.remove('visible');
            }
        });
    });
</script></body></html>
