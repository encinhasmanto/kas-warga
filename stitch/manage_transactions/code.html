<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto bg-white dark:bg-slate-900 shadow-xl min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-10 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center p-4 justify-between">
<button class="text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-slate-100">Entry Form</h1>
<div class="w-10"></div> <!-- Spacer -->
</div>
<!-- Tab Navigation -->
<div class="flex px-4">
<button class="flex-1 flex flex-col items-center justify-center border-b-2 border-primary text-primary py-3 transition-all">
<span class="text-sm font-bold">Income</span>
</button>
<button class="flex-1 flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 py-3 hover:text-slate-700">
<span class="text-sm font-medium">Expense</span>
</button>
<button class="flex-1 flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 py-3 hover:text-slate-700">
<span class="text-sm font-medium">Correction</span>
</button>
</div>
</header>
<main class="flex-1 p-4 space-y-6">
<!-- Income Section (Active Tab) -->
<section class="space-y-6">
<!-- Level 1: Category Selection -->
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Category (Level 1)</label>
<div class="grid grid-cols-3 gap-2">
<button class="py-3 px-2 rounded-xl bg-primary text-white text-xs font-bold text-center shadow-sm">
                            IPL
                        </button>
<button class="py-3 px-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-medium text-center border border-slate-200 dark:border-slate-700">
                            THR
                        </button>
<button class="py-3 px-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-medium text-center border border-slate-200 dark:border-slate-700">
                            Iuran Lainnya
                        </button>
</div>
</div>
<!-- Level 2: Sub-category (Contextual for IPL) -->
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Type (Level 2)</label>
<div class="grid grid-cols-2 gap-2">
<button class="py-3 px-4 rounded-xl bg-primary/10 border border-primary/30 text-primary text-sm font-bold text-center">
                            Ruko
                        </button>
<button class="py-3 px-4 rounded-xl bg-slate-50 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 text-sm font-medium text-center border border-slate-200 dark:border-slate-700">
                            Townhouse
                        </button>
</div>
</div>
<!-- Level 3: Unit Selection -->
<div class="space-y-3">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Unit (Level 3)</label>
<span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">Ruko Units</span>
</div>
<div class="grid grid-cols-4 gap-2">
<button class="py-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-xs font-semibold hover:bg-primary/20 transition-colors">R1</button>
<button class="py-2 rounded-lg bg-primary text-white text-xs font-bold shadow-md shadow-primary/20">R2</button>
<button class="py-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-xs font-semibold">R3</button>
<button class="py-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-xs font-semibold">R4</button>
<button class="py-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-xs font-semibold">R5</button>
<button class="py-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-xs font-semibold">R6</button>
<button class="py-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-xs font-semibold">R7</button>
<button class="py-2 rounded-lg bg-slate-50 dark:bg-slate-800/30 text-slate-400 border border-dashed border-slate-300 dark:border-slate-700 text-xs">More</button>
</div>
</div>
<!-- Amount Input -->
<div class="space-y-3 pt-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Amount</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400 group-focus-within:text-primary">Rp</span>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl py-4 pl-12 pr-4 text-xl font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-slate-300" placeholder="1.000.000" type="text"/>
</div>
</div>
<!-- Note Input -->
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1 text-primary">Notes (Optional)</label>
<textarea class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl p-4 text-sm text-slate-700 dark:text-slate-300 focus:ring-2 focus:ring-primary/50 min-h-[100px] resize-none" placeholder="Add details about this payment..."></textarea>
</div>
</section>
<!-- Submit Action -->
<div class="pt-4 pb-20">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
<span class="material-symbols-outlined">save</span>
                    Save Transaction
                </button>
</div>
</main>
<!-- Bottom Navigation Component -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 pb-6 pt-3 flex justify-between items-center z-20">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px] font-bold">Entries</span>
</a>
<div class="relative -top-8">
<button class="bg-primary text-white p-4 rounded-full shadow-xl shadow-primary/40 border-4 border-white dark:border-slate-900">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="text-[10px] font-medium">Reports</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-medium">Settings</span>
</a>
</nav>
</div>
<!-- Hidden Template: Expense Form Preview (for high-fidelity demo) -->
<!-- This would normally be toggled via JS, showing it here as an 'inactive' state example -->
<div class="hidden">
<div class="space-y-4">
<label class="text-sm font-semibold text-slate-700">Expense Category</label>
<select class="w-full bg-slate-50 border-none rounded-xl py-4 px-4 text-sm font-medium">
<option>Payroll &amp; Benefits</option>
<option>Maintenance &amp; Repairs</option>
<option>Outside Services</option>
<option>Utilities</option>
<option>Office Supplies</option>
</select>
</div>
</div>
</body></html>
